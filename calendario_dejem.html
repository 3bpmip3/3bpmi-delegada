<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Escalas DEJEM - 3º BPM/I</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --cor-azul: #0056b3;
            --cor-ouro: #d4af37;
            --cor-verde-oliva: #556b2f;
            --fundo-pastel: #fdfcf0;
            --texto-principal: #333;
            --cor-vermelho: #c62828;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: var(--fundo-pastel);
            width: 100%;
            max-width: 950px;
            padding: 25px;
            border-radius: 15px;
            border: 3px solid var(--cor-ouro);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--cor-ouro);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header-acoes {
            display: flex;
            gap: 10px;
        }

        h1 { font-size: 1.2rem; color: var(--cor-azul); text-transform: uppercase; margin: 0; }

        .btn-criar {
            background-color: var(--cor-azul);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-criar:hover { opacity: 0.9; }

        .btn-voltar-header {
            background-color: #666;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
        }

        .dia-item {
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .dia-info {
            font-weight: bold;
            color: var(--cor-azul);
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 0.9rem;
            border-bottom: 1px solid #eee;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            background-color: #f2f2f2;
            color: #555;
            padding: 8px;
            border: 1px solid #ddd;
            text-align: center;
        }

        td {
            padding: 8px;
            border: 1px solid #ddd;
            text-align: center;
            vertical-align: middle;
        }

        .btn-editar {
            background: var(--cor-ouro);
            color: #333;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 4px;
        }

        .btn-excluir {
            background: var(--cor-vermelho);
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 95%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .cal-selection {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin: 15px 0;
            background: #f9f9f9;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .cal-day {
            background: white;
            border: 1px solid #ccc;
            padding: 10px 0;
            text-align: center;
            cursor: pointer;
            font-size: 0.8rem;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .cal-day:hover { border-color: var(--cor-azul); }

        .cal-day.selected {
            background: var(--cor-azul);
            color: white;
            border-color: var(--cor-azul);
            font-weight: bold;
        }

        .cal-header { font-weight: bold; font-size: 0.7rem; color: #666; text-align: center; padding-bottom: 5px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label { font-size: 0.75rem; font-weight: bold; color: #555; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.9rem; }
        
        .obrigatorio { color: #d93025; margin-left: 2px; }

        .btn-salvar-modal {
            background: var(--cor-verde-oliva);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 6px;
            margin-top: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        .fechar-modal { 
            position: absolute;
            right: 15px;
            top: 15px;
            cursor: pointer; 
            color: #666; 
            font-weight: bold;
            font-size: 0.8rem;
        }
        .fechar-modal:hover { color: red; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="titulo-data">Escalas</h1>
        <div class="header-acoes">
            <a href="home_dejem.html" class="btn-voltar-header">← VOLTAR</a>
            <button class="btn-criar" onclick="abrirModal()">Criar Escala</button>
        </div>
    </div>

    <div id="lista-dias"></div>
</div>

<div id="modalEscala" class="modal">
    <div class="modal-content">
        <span class="fechar-modal" onclick="fecharModal()">[ FECHAR X ]</span>
        <h3 id="modal-titulo" style="margin-top: 0; color: var(--cor-azul);">Nova Escala DEJEM</h3>
        
        <div id="calendar-container">
            <label>Selecione o(s) dia(s)<span class="obrigatorio">*</span>:</label>
            <div id="modal-calendar" class="cal-selection"></div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>ID Escala (Opcional)</label>
                <input type="number" id="id-escala" placeholder="Ex: 12345" oninput="limitChar(this, 7)">
            </div>
            <div class="form-group">
                <label>Descrição da Missão<span class="obrigatorio">*</span></label>
                <input type="text" id="desc-escala" placeholder="Ex: Evento, ODSI">
            </div>
            <div class="form-group">
                <label>Hora Início (Turno 8h)<span class="obrigatorio">*</span></label>
                <input type="time" id="hora-inicio" onchange="calcTermino()">
            </div>
            <div class="form-group">
                <label>Hora Término (Automático)</label>
                <input type="text" id="hora-termino" readonly style="background: #eee;">
            </div>
            <div class="form-group">
                <label>Qtd Oficiais<span class="obrigatorio">*</span></label>
                <input type="number" id="qtd-of" placeholder="0" oninput="limitChar(this, 2)">
            </div>
            <div class="form-group">
                <label>Qtd Praças<span class="obrigatorio">*</span></label>
                <input type="number" id="qtd-pr" placeholder="0" oninput="limitChar(this, 2)">
            </div>
        </div>

        <input type="hidden" id="edit-uuid"> <input type="hidden" id="edit-dia-num">

        <button id="btn-salvar-texto" class="btn-salvar-modal" onclick="salvarEscala()">Salvar Escala(s)</button>
    </div>
</div>

<script>
    // --- CONFIGURAÇÃO SUPABASE ---
    const SUPABASE_URL = 'https://jzpxjpnnuwcwmhhzbklf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6cHhqcG5udXdjd21oaHpia2xmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDI2MjIsImV4cCI6MjA5MTg3ODYyMn0.yFxac1WkKjXl6z9127YVfqaXc10fU1gq5lTY-VWpmAM';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const mesNome = urlParams.get('mes') || "Janeiro";
    const ano = urlParams.get('ano') || "2024";
    const mesesMap = { "Janeiro": 0, "Fevereiro": 1, "Março": 2, "Abril": 3, "Maio": 4, "Junho": 5, "Julho": 6, "Agosto": 7, "Setembro": 8, "Outubro": 9, "Novembro": 10, "Dezembro": 11 };
    
    let diasSelecionados = [];

    document.getElementById('titulo-data').innerText = `DEJEM: ${mesNome} / ${ano}`;

    function limitChar(el, max) { if(el.value.length > max) el.value = el.value.slice(0, max); }

    function calcTermino() {
        const hIni = document.getElementById('hora-inicio').value;
        if(hIni) {
            let [h, m] = hIni.split(':').map(Number);
            let hFim = (h + 8) % 24;
            document.getElementById('hora-termino').value = `${hFim.toString().padStart(2, '0')}h${m.toString().padStart(2, '0')}`;
        }
    }

    // Renderiza o calendário de seleção no modal
    function renderModalCalendar() {
        const container = document.getElementById('modal-calendar');
        container.innerHTML = "";
        const diasSemanaShort = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
        diasSemanaShort.forEach(d => { const h = document.createElement('div'); h.className = 'cal-header'; h.innerText = d; container.appendChild(h); });

        const mesIdx = mesesMap[mesNome];
        const primeiroDiaSemana = new Date(ano, mesIdx, 1).getDay();
        const totalDias = new Date(ano, mesIdx + 1, 0).getDate();

        for (let i = 0; i < primeiroDiaSemana; i++) { const v = document.createElement('div'); container.appendChild(v); }

        for (let d = 1; d <= totalDias; d++) {
            const div = document.createElement('div');
            div.className = 'cal-day' + (diasSelecionados.includes(d) ? ' selected' : '');
            div.innerText = d;
            div.onclick = () => {
                if(diasSelecionados.includes(d)) diasSelecionados = diasSelecionados.filter(x => x !== d);
                else diasSelecionados.push(d);
                renderModalCalendar();
            };
            container.appendChild(div);
        }
    }

    // CARREGAR DADOS DO SUPABASE
    async function carregarDados() {
        const lista = document.getElementById('lista-dias');
        lista.innerHTML = "<p style='text-align:center; color: #666;'>Sincronizando com Banco de Dados...</p>";

        const { data: escalas, error } = await _supabase
            .from('escalas_dejem')
            .select('*')
            .eq('mes', mesNome)
            .eq('ano', ano)
            .order('dia', { ascending: true })
            .order('hora_inicio', { ascending: true });

        if (error) {
            alert("Erro ao carregar dados: " + error.message);
            return;
        }

        renderizarTabela(escalas);
    }

    function renderizarTabela(escalas) {
        const lista = document.getElementById('lista-dias');
        lista.innerHTML = "";
        const mesIdx = mesesMap[mesNome];
        const totalDias = new Date(ano, mesIdx + 1, 0).getDate();

        for (let d = 1; d <= totalDias; d++) {
            const dataObj = new Date(ano, mesIdx, d);
            const diaSemana = dataObj.toLocaleDateString('pt-br', { weekday: 'long' });
            const escalasDoDia = escalas.filter(e => e.dia == d);

            const item = document.createElement('div');
            item.className = 'dia-item';
            
            let html = `<div class="dia-info">Dia ${d} - ${diaSemana}</div><table><thead><tr><th>ID ESCALA</th><th>TURNO</th><th>DESCRIÇÃO</th><th>QTD OF</th><th>QTD PR</th><th>AÇÃO</th></tr></thead><tbody>`;

            if(escalasDoDia.length > 0) {
                escalasDoDia.forEach(esc => {
                    html += `<tr>
                        <td><strong>${esc.id_escala_pm || '-'}</strong></td>
                        <td>Das ${esc.hora_inicio} às ${esc.hora_termino}</td>
                        <td style="text-align:left">${esc.descricao}</td>
                        <td>${esc.qtd_oficiais}</td>
                        <td>${esc.qtd_pracas}</td>
                        <td>
                            <button class="btn-editar" onclick="editarEscala('${esc.id}')">Editar</button>
                            <button class="btn-excluir" onclick="excluirEscala('${esc.id}')">Excluir</button>
                        </td>
                    </tr>`;
                });
            } else {
                html += `<tr><td colspan="6" style="color:#aaa; font-style: italic;">Nenhuma escala programada</td></tr>`;
            }
            html += `</tbody></table>`;
            item.innerHTML = html;
            lista.appendChild(item);
        }
    }

    // SALVAR OU ATUALIZAR
    async function salvarEscala() {
        const desc = document.getElementById('desc-escala').value;
        const iniRaw = document.getElementById('hora-inicio').value;
        const of = document.getElementById('qtd-of').value;
        const pr = document.getElementById('qtd-pr').value;
        const uuidParaEditar = document.getElementById('edit-uuid').value;

        if(!desc || !iniRaw || !of || !pr) { alert("Preencha todos os campos obrigatórios."); return; }
        
        const dadosBase = {
            id_escala_pm: document.getElementById('id-escala').value,
            descricao: desc,
            hora_inicio: iniRaw.replace(':', 'h'),
            hora_termino: document.getElementById('hora-termino').value,
            qtd_oficiais: parseInt(of),
            qtd_pracas: parseInt(pr),
            mes: mesNome,
            ano: ano
        };

        document.getElementById('btn-salvar-texto').innerText = "Processando...";

        if(uuidParaEditar) {
            // MODO EDIÇÃO: Atualiza registro existente
            const { error } = await _supabase
                .from('escalas_dejem')
                .update(dadosBase)
                .eq('id', uuidParaEditar);
            
            if(error) alert("Erro ao atualizar: " + error.message);
        } else {
            // MODO NOVO: Inserção simples ou múltipla
            if(diasSelecionados.length === 0) { alert("Selecione os dias no calendário."); return; }
            const registros = diasSelecionados.map(d => ({ ...dadosBase, dia: d }));
            
            const { error } = await _supabase
                .from('escalas_dejem')
                .insert(registros);
            
            if(error) alert("Erro ao salvar: " + error.message);
        }

        fecharModal();
        carregarDados();
    }

    // EXCLUIR
    async function excluirEscala(uuid) {
        if(confirm("Deseja realmente excluir esta escala do banco de dados?")) {
            const { error } = await _supabase.from('escalas_dejem').delete().eq('id', uuid);
            if(error) alert("Erro ao excluir: " + error.message);
            else carregarDados();
        }
    }

    // ABRIR MODAL PARA EDIÇÃO
    async function editarEscala(uuid) {
        const { data: esc, error } = await _supabase.from('escalas_dejem').select('*').eq('id', uuid).single();
        if(error) return;

        abrirModal();
        document.getElementById('modal-titulo').innerText = `Editar Escala - Dia ${esc.dia}`;
        document.getElementById('calendar-container').style.display = "none";
        
        document.getElementById('edit-uuid').value = esc.id;
        document.getElementById('id-escala').value = esc.id_escala_pm;
        document.getElementById('desc-escala').value = esc.descricao;
        document.getElementById('hora-inicio').value = esc.hora_inicio.replace('h', ':');
        document.getElementById('hora-termino').value = esc.hora_termino;
        document.getElementById('qtd-of').value = esc.qtd_oficiais;
        document.getElementById('qtd-pr').value = esc.qtd_pracas;
        document.getElementById('btn-salvar-texto').innerText = "Atualizar Escala";
    }

    function abrirModal() {
        diasSelecionados = [];
        document.getElementById('edit-uuid').value = "";
        document.getElementById('id-escala').value = "";
        document.getElementById('desc-escala').value = "";
        document.getElementById('hora-inicio').value = "";
        document.getElementById('hora-termino').value = "";
        document.getElementById('qtd-of').value = "";
        document.getElementById('qtd-pr').value = "";
        document.getElementById('calendar-container').style.display = "block";
        document.getElementById('modal-titulo').innerText = "Nova Escala DEJEM";
        document.getElementById('btn-salvar-texto').innerText = "Salvar Escala(s)";
        renderModalCalendar();
        document.getElementById('modalEscala').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('modalEscala').style.display = 'none'; }

    // Inicialização
    carregarDados();
</script>
</body>
</html>
