<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Seleção</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
</head>
<body>

    <div class="container">
        <h2>Selecione o Período</h2>
        
        <div class="form-group">
            <label for="select-month">Mês</label>
            <select id="select-month">
                <option value="01">Janeiro</option>
                <option value="02">Fevereiro</option>
                <option value="03">Março</option>
                <option value="04">Abril</option>
                <option value="05">Maio</option>
                <option value="06">Junho</option>
                <option value="07">Julho</option>
                <option value="08">Agosto</option>
                <option value="09">Setembro</option>
                <option value="10">Outubro</option>
                <option value="11">Novembro</option>
                <option value="12">Dezembro</option>
            </select>
        </div>

        <div class="form-group">
            <label for="select-year">Ano</label>
            <select id="select-year">
                <option value="2026">2026</option>
                <option value="2027">2027</option>
                <option value="2028">2028</option>
                <option value="2029">2029</option>
                <option value="2030">2030</option>
            </select>
        </div>

        <button id="btn-confirm">Confirmar Seleção</button>
        <button id="btn-logout" style="background-color: #ef4444; margin-top: 10px;">Sair</button>
    </div>

    <script>
        const SUPABASE_URL = "https://yiabgfhtvevrrtfyhjxd.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpYWJnZmh0dmV2cnJ0ZnloanhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NDg4OTAsImV4cCI6MjA5NDEyNDg5MH0.th7vVdBYGI5TmegMNP4JC66doOvSIWXjSgFGhAHpNzM"; // Certifique-se de colocar sua chave real aqui
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // PROTEÇÃO DA PÁGINA
        async function checkUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.assign("index.html");
            }
        }
        checkUser();

        // AÇÃO DO BOTÃO CONFIRMAR (Redirecionamento com parâmetros)
        document.getElementById('btn-confirm').addEventListener('click', () => {
            const mes = document.getElementById('select-month').value;
            const ano = document.getElementById('select-year').value;
            
            // Redireciona passando o mês e ano na URL
            window.location.assign(`controlDelegada.html?mes=${mes}&ano=${ano}`);
        });

        // AÇÃO DE LOGOUT
        document.getElementById('btn-logout').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.assign("index.html");
        });
    </script>
</body>
</html>
