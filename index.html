<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Supabase</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <style>
        /* Estilos adicionais para garantir que a foto principal fique centralizada e bem dimensionada */
        .logo-principal {
            display: block;
            margin: 0 auto 20px auto; /* Centraliza e dá margem abaixo da imagem */
            max-width: 150px;         /* Ajuste o tamanho máximo conforme necessário */
            height: auto;
            /* EFEITO SOMBREADO NO BRASÃO */
            filter: drop-shadow(0px 8px 6px rgba(0, 0, 0, 0.35));
        }
        .container {
            text-align: center;       /* Garante o alinhamento central dos elementos do topo */
        }
        #login-form {
            text-align: left;         /* Mantém os campos do formulário alinhados à esquerda */
        }

        /* EFEITO 3D NAS CAIXAS DE TEXTO (INPUTS) */
        .form-group {
            margin-bottom: 20px;      /* Espaçamento entre os campos */
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            font: inherit;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: #fff;
            outline: none;
            
            /* Sombra que cria a base/profundidade 3D */
            box-shadow: 
                0 4px 0 0 #d5d5d5, 
                inset 0 2px 4px rgba(0, 0, 0, 0.08);
            
            transition: transform 0.2s, box-shadow 0.2s;
        }
        /* Efeito de clique/foco na caixa de texto */
        .form-group input:focus {
            border-color: #4b5836;    /* Cor verde-militar combinando com o botão */
            transform: translateY(2px);
            box-shadow: 
                0 2px 0 0 #4b5836, 
                inset 0 2px 4px rgba(0, 0, 0, 0.12);
        }

        /* Estilo do Botão Mesclado com Cor Verde-Militar */
        #btn-login {
            -webkit-appearance: none;
            appearance: none;
            position: relative;
            border-width: 0;
            padding: 10px 16px 14px;
            min-width: 10em;
            box-sizing: border-box;
            background: transparent;
            font: inherit;
            cursor: pointer;
            display: block;
            margin: 25px auto 0 auto;

            /* Camada de Texto e Topo */
            align-items: center;
            justify-content: center;
            z-index: 0;
            transform: translateY(0);
            text-align: center;
            color: #fff;
            text-shadow: 0 -1px rgba(0, 0, 0, .25);
            -webkit-user-select: none;
            user-select: none;
            border-radius: 4px;
            
            /* Gradiente Verde-Militar */
            background-image: radial-gradient(#6b7e50, #4b5836);
            
            /* Profundidade 3D (Base em verde-militar bem escuro #343e24) */
            box-shadow: 
                inset 0 0 0px 1px rgba(255, 255, 255, .2), 
                0 1px 2px 1px rgba(255, 255, 255, .2),
                0 6px 0 0 #343e24,
                0 8px 4px 0 rgba(0, 0, 0, .15);
            
            transition-property: transform, box-shadow, border-radius;
            transition-duration: .2s;
        }

        /* Efeito de Clique de Pressão 3D no Botão */
        #btn-login:active {
            transform: translateY(6px);
            border-radius: 6px;
            box-shadow: 
                inset 0 0 0px 1px rgba(255, 255, 255, .2), 
                0 1px 2px 1px rgba(255, 255, 255, .2),
                0 0px 0 0 #343e24,
                0 2px 2px 0 rgba(0, 0, 0, .15);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="Brasão 3BC.png" alt="Brasão 3BC" class="logo-principal">
        
        <h2>ATIVIDADE DELEGADA</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" id="btn-login">Entrar</button>
            <p id="error-message" class="error-msg"></p>
        </form>
    </div>

    <script>
    // 1. Defina as constantes APENAS com os valores limpos do painel
    const SUPABASE_URL = "https://yiabgfhtvevrrtfyhjxd.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpYWJnZmh0dmV2cnJ0ZnloanhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NDg4OTAsImV4cCI6MjA5NDEyNDg5MH0.th7vVdBYGI5TmegMNP4JC66doOvSIWXjSgFGhAHpNzM"; // Cole sua chave real aqui
    
    // 2. Inicialize o cliente utilizando a variável global correta da CDN
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorCtx = document.getElementById('error-message');
        const btnLogin = document.getElementById('btn-login');

        btnLogin.innerText = "Carregando...";
        errorCtx.style.display = "none";

        try {
            // 3. Executa a autenticação no endpoint correto (/auth/v1/token) de forma interna
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorCtx.innerText = "Erro: " + error.message;
                errorCtx.style.display = "block";
                btnLogin.innerText = "Entrar";
            } else {
                // Redireciona para o dashboard local do Live Server
                window.location.assign("dashboard.html");
            }
        } catch (err) {
            console.error("Erro inesperado:", err);
            btnLogin.innerText = "Entrar";
        }
    });
</script>
</body>
</html>
