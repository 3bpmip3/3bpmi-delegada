<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema P/3 - 3º BC</title>
    <style>
        :root {
            /* Paleta extraída do Brasão */
            --cor-azul: #0056b3;       
            --cor-vermelho: #c62828;   
            --cor-ouro: #d4af37;       
            --fundo-pastel: #fdfcf0;   
            --texto-principal: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: var(--fundo-pastel);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid var(--cor-ouro);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        .brasao-img {
            width: 180px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        h1 {
            font-size: 1.25rem;
            color: var(--texto-principal);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        h2 {
            font-size: 0.95rem;
            color: #555;
            font-weight: 400;
            margin-top: 8px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        input[type="password"] {
            width: 80%;
            padding: 10px;
            border: 2px solid var(--cor-ouro);
            border-radius: 6px;
            font-size: 0.9rem;
            text-align: center;
            background: #fff;
            transition: transform 0.2s;
        }

        input[type="password"]:focus {
            outline: none;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        .btn {
            width: 85%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: filter 0.3s, transform 0.1s;
        }

        .btn-acessar {
            background-color: var(--cor-azul);
            color: white;
            box-shadow: 0 3px 6px rgba(0, 86, 179, 0.2);
        }

        .btn-escalas {
            background-color: var(--cor-vermelho);
            color: white;
            box-shadow: 0 3px 6px rgba(198, 40, 40, 0.2);
        }

        .btn:hover {
            filter: brightness(1.15);
        }

        .btn:active {
            transform: translateY(1px);
        }

        footer {
            margin-top: 35px;
            font-size: 0.7rem;
            color: #666;
            font-weight: 600;
            line-height: 1.4;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        footer span {
            display: block;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="Brasão 3BC.png" alt="Brasão 3BC" class="brasao-img">
        
        <h1>3º Batalhão de Caçadores</h1>
        <h2>Sistema P/3 - Acesso</h2>

        <div class="form-group">
            <input type="password" id="inputSenha" placeholder="SENHA">
            
            <button class="btn btn-acessar" onclick="realizarAcesso()">Acessar</button>
            
            <button class="btn btn-escalas" onclick="window.location.href='acesso_dejem_e_delegada.html'">Consultar Escalas</button>
        </div>

        <footer>
            <span>SECRETARIA DE SEGURANÇA PÚBLICA</span>
            <span>POLÍCIA MILITAR DO ESTADO DE SÃO PAULO</span>
            <span>3º BPM/I - CEL PM SPANÓ</span>
        </footer>
    </div>

    <script>
        // Função para validar a senha e redirecionar
        function realizarAcesso() {
            const senhaDigitada = document.getElementById('inputSenha').value;
            const senhaCorreta = "1533";

            if (senhaDigitada === senhaCorreta) {
                // Redireciona para a página solicitada
                window.location.href = "acesso_dejem_e_delegada.html";
            } else {
                alert("Senha inválida. Larga mão de ser curioso!");
                document.getElementById('inputSenha').value = "";
                document.getElementById('inputSenha').focus();
            }
        }

        // Detecta a tecla Enter no campo de senha
        document.getElementById('inputSenha').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                realizarAcesso();
            }
        });
    </script>

</body>
</html>
