<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - 3º BPM/I (DELEGADA)</title>
    <style>
        :root {
            --dourado: #b08d4a;
            --dark-bg: #0f172a;
            --bg-body: #f1f5f9;
            --texto-principal: #1e293b;
            --texto-suave: #475569;
            --sucesso: #059669;
            --erro: #dc2626;
            --azul-edit: #2563eb;
            --fds-bg: #fff1f2;
            --border-color: #cbd5e1;
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            background-color: var(--bg-body);
            color: var(--texto-principal);
            height: 100vh; 
            overflow: hidden; 
        }

        .sidebar { 
            width: 260px; 
            background: var(--dark-bg);
            color: white;
            display: flex; 
            flex-direction: column; 
            padding: 20px 0; 
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .sidebar-header { text-align: center; padding-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.15); }
        .sidebar-header img { width: 75px; margin-bottom: 10px; }
        .sidebar-header h3 { font-size: 0.85rem; letter-spacing: 1.2px; color: var(--dourado); margin: 0; text-transform: uppercase; font-weight: 800; }
        
        .menu-item { 
            padding: 16px 25px; 
            color: #e2e8f0; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-size: 0.95rem;
            font-weight: 500;
            border-left: 5px solid transparent;
        }
        .menu-item:hover { background: rgba(255,255,255,0.1); color: white; border-left: 5px solid var(--dourado); }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }

        .header { 
            background: white; 
            padding: 0 40px; 
            height: 70px;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--border-color);
            z-index: 10;
        }

        .content-area { padding: 30px; overflow-y: auto; flex-grow: 1; padding-bottom: 100px; }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            min-height: 90%;
        }

        .subtitle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }

        .subtitle { 
            color: var(--dark-bg); 
            font-weight: 800; 
            font-size: 1.4rem; 
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0;
        }
        .subtitle::before { content: ''; width: 6px; height: 24px; background: var(--dourado); border-radius: 3px; }

        .table-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border-color); }
        .delegada-table { width: 100%; border-collapse: collapse; background: white; table-layout: fixed; }
        
        .delegada-table thead th { 
            background: #f8fafc; 
            color: #1e293b; 
            padding: 15px 10px;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 800;
            border-bottom: 3px solid var(--border-color);
            text-align: center;
        }

        .delegada-table tbody td { 
            padding: 14px 10px; 
            text-align: center; 
            font-size: 0.95rem; 
            color: var(--texto-principal);
            font-weight: 500;
            border-bottom: 1px solid #e2e8f0;
            word-wrap: break-word;
            vertical-align: middle;
        }

        .col-data { width: 110px; }
        .col-id { width: 130px; }
        .col-turno { width: 150px; }
        .col-desc { width: auto; }
        .col-qtd { width: 90px; }
        .col-acoes { width: 160px; }

        .day-row { font-weight: 800; color: #334155; background: #f8fafc !important; border-right: 2px solid #e2e8f0; }
        .weekend { background-color: var(--fds-bg) !important; }
        .weekend .day-row { color: #be123c; background-color: #ffe4e6; }

        .action-btns { display: flex; gap: 8px; justify-content: center; }
        .btn-action { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .btn-edit { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
        .btn-delete { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }

        .btn-nova { 
            background: rgba(5, 150, 94, 0.7); 
            backdrop-filter: blur(10px); 
            color: white; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 12px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 0.9rem; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .footer-stats {
            position: fixed;
            bottom: 0;
            right: 0;
            width: calc(100% - 260px);
            background: white;
            border-top: 2px solid var(--border-color);
            padding: 15px 40px;
            display: flex;
            justify-content: flex-end;
            gap: 30px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
            z-index: 50;
        }

        .stat-item { display: flex; align-items: center; gap: 10px; font-weight: 700; color: var(--dark-bg); }
        .stat-value { font-size: 1.2rem; color: var(--azul-edit); background: #eff6ff; padding: 4px 12px; border-radius: 6px; border: 1px solid #bfdbfe; }

        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(5px);
            justify-content: center; 
            align-items: center; 
        }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 550px; max-height: 90vh; overflow-y: auto; }

        input, select { width: 100%; padding: 12px; margin-top: 4px; border: 2px solid var(--border-color); border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        #loading-msg { font-size: 0.85rem; color: var(--azul-edit); font-weight: 800; display: none; }

        .days-list { margin-top: 10px; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; background: #f8fafc; }
        .day-entry { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; background: white; padding: 8px; border-radius: 6px; border: 1px solid #e2e8f0; }
        .day-entry span { flex: 1; font-weight: 600; font-size: 0.9rem; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <img src="Brasão 3BC.png" alt="Brasão">
        <h3>Sistema 3º BPM/I</h3>
    </div>
    <nav style="margin-top: 15px;">
        <div class="menu-item" onclick="showDashboard()">Início</div>
        <div class="menu-item" onclick="showDelegadaSelector()">Atividade DELEGADA</div>
    </nav>
</aside>

<main class="main-content">
    <header class="header">
        <h2 id="page-title" style="margin:0; font-size: 1.1rem; color: var(--texto-suave); font-weight: 700;">Painel de Controle</h2>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span id="loading-msg">Sincronizando...</span>
            <button onclick="logout()" style="background:white; color:var(--erro); border:1px solid var(--erro); padding:6px 15px; border-radius:6px; cursor:pointer; font-size: 0.8rem; font-weight: 700;">SAIR</button>
        </div>
    </header>
    <section class="content-area">
        <div id="dynamic-content" class="card"></div>
    </section>

    <footer class="footer-stats" id="footer-stats" style="display: none;">
        <div class="stat-item">TOTAL OFICIAIS: <span id="total-oficiais" class="stat-value">0</span></div>
        <div class="stat-item">TOTAL PRAÇAS: <span id="total-pracas" class="stat-value">0</span></div>
    </footer>
</main>

<div id="modalEscala" class="modal">
    <div class="modal-content">
        <h3 id="modal-title" style="margin: 0 0 20px 0; font-weight: 800;">Gerenciar Escala</h3>
        <form id="formEscala">
            <input type="hidden" id="edit-index">
            
            <div id="multi-day-container">
                <label>Data</label>
                <div style="display:flex; gap:10px;">
                    <input type="date" id="esc-data-picker">
                    <button type="button" class="btn-nova" onclick="addDayToList()">+ Add</button>
                </div>
                <div id="selected-days-list" class="days-list"></div>
            </div>

            <div id="single-day-container" style="display:none; margin-bottom:15px;">
                <label>Data</label><input type="date" id="esc-data-single">
                <label>ID</label><input type="text" id="esc-id-single">
            </div>

            <div style="display:flex; gap:15px; margin:15px 0;">
                <div style="flex:1;"><label>Início</label><input type="time" id="esc-inicio" oninput="calcularTermino()" required></div>
                <div style="flex:1;"><label>Término</label><input type="time" id="esc-termino" readonly></div>
            </div>
            
            <label>Descrição</label><input type="text" id="esc-desc" required>
            
            <div style="display:flex; gap:15px; margin:15px 0 25px 0;">
                <div style="flex:1;"><label>Oficiais</label><input type="number" id="esc-oficiais" value="0"></div>
                <div style="flex:1;"><label>Praças</label><input type="number" id="esc-pracas" value="0"></div>
            </div>

            <div style="display:flex; justify-content:flex-end; gap:12px;">
                <button type="button" onclick="fecharModal()" style="background:none; border:none; cursor:pointer;">CANCELAR</button>
                <button type="submit" class="btn-nova">SALVAR</button>
            </div>
        </form>
    </div>
</div>

<script>
    // CERTIFIQUE-SE DE QUE ESTA URL É A DO SEU WEB APP ATUALIZADA
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx0DEA_FZQfJ2fWh00727YdGP47g1Vs1pzqu9ZYbzErJoZPkExEwtIawu2Be6NCoIX2wg/exec'; 

    let escalasBD = [];
    let selectedDays = [];
    const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    const abasMeses = ["jan", "fev", "mar", "abr", "mai", "jun", "jul", "ago", "set", "out", "nov", "dez"];
    const diasSemana = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

    async function loadFromSheets() {
        const mesIdx = document.getElementById('active-mes')?.value;
        const ano = document.getElementById('active-ano')?.value;
        if(!mesIdx || !ano) return;

        const siglaMes = abasMeses[parseInt(mesIdx)];
        const finalAno = ano.slice(-2);

        document.getElementById('loading-msg').style.display = 'inline';
        try {
            const url = `${SCRIPT_URL}?mes=${siglaMes}&ano=${finalAno}`;
            const response = await fetch(url);
            const data = await response.json();
            escalasBD = data || [];
        } catch (e) { 
            console.error("Erro ao buscar:", e);
            escalasBD = []; 
        }
        document.getElementById('loading-msg').style.display = 'none';
        generateDelegadaList();
    }

    async function syncToSheets() {
        const mesIdx = document.getElementById('active-mes').value;
        const ano = document.getElementById('active-ano').value;
        const siglaMes = abasMeses[parseInt(mesIdx)];
        const finalAno = ano.slice(-2);
        
        document.getElementById('loading-msg').style.display = 'inline';
        const payload = { mes: siglaMes, ano: finalAno, escalas: escalasBD };
        
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            setTimeout(loadFromSheets, 800);
        } catch (e) { console.error(e); }
        document.getElementById('loading-msg').style.display = 'none';
    }

    function showDashboard() {
        localStorage.removeItem('ultimoMes');
        localStorage.removeItem('ultimoAno');
        document.getElementById('page-title').innerText = "INÍCIO";
        document.getElementById('footer-stats').style.display = 'none';
        document.getElementById('dynamic-content').innerHTML = `
            <h3>Bem Vindo</h3>
            <p>Os dados são recuperados da planilha do <b>Google Sheets</b> automaticamente.</p>
        `;
    }

    async function showDelegadaSelector() {
        document.getElementById('page-title').innerText = "Atividade DELEGADA";
        document.getElementById('footer-stats').style.display = 'none';
        document.getElementById('dynamic-content').innerHTML = `
            <div style="text-align:center; padding:40px;">
                <h3 class="subtitle" style="justify-content:center;">Selecione o Período</h3>
                <div style="display:flex; justify-content:center; gap:15px; margin: 30px 0;">
                    <select id="sel-ano" style="width:130px;">
                        <option value="2026">2026</option><option value="2027">2027</option>
                    </select>
                    <select id="sel-mes" style="width:180px;">
                        ${nomesMeses.map((m, i) => `<option value="${i}">${m}</option>`).join('')}
                    </select>
                </div>
                <button class="btn-nova" style="margin:0 auto;" onclick="renderTableFlow()">ACESSAR CALENDÁRIO</button>
            </div>
        `;
    }

    async function renderTableFlow() {
        const mesIdx = document.getElementById('sel-mes').value;
        const ano = document.getElementById('sel-ano').value;
        
        localStorage.setItem('ultimoMes', mesIdx);
        localStorage.setItem('ultimoAno', ano);

        const mesInt = parseInt(mesIdx);
        document.getElementById('dynamic-content').innerHTML = `
            <div class="subtitle-container">
                <div style="display:flex; align-items:center; gap:15px;">
                    <button onclick="showDelegadaSelector()" style="cursor:pointer; padding:5px 10px;">←</button>
                    <h3 class="subtitle">${nomesMeses[mesInt]} ${ano}</h3>
                </div>
                <button class="btn-nova" onclick="abrirModal()">+ Nova Escala</button>
            </div>
            <div class="table-wrapper"><div id="delegada-list-container">Carregando dados da planilha...</div></div>
            <input type="hidden" id="active-mes" value="${mesInt}"><input type="hidden" id="active-ano" value="${ano}">
        `;
        document.getElementById('footer-stats').style.display = 'flex';
        await loadFromSheets();
    }

    function generateDelegadaList() {
        const container = document.getElementById('delegada-list-container');
        if(!container) return;
        const mesIdx = parseInt(document.getElementById('active-mes').value);
        const ano = parseInt(document.getElementById('active-ano').value);
        const diasNoMes = new Date(ano, mesIdx + 1, 0).getDate();
        
        let tOficiais = 0, tPracas = 0;
        let html = `<table class="delegada-table"><thead><tr><th>DATA</th><th>ID</th><th>TURNO</th><th>DESCRIÇÃO</th><th>OF</th><th>PR</th><th>AÇÕES</th></tr></thead><tbody>`;

        for (let d = 1; d <= diasNoMes; d++) {
            const dataObj = new Date(ano, mesIdx, d);
            const diaSem = dataObj.getDay();
            const dataIso = `${ano}-${(mesIdx+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            const escalas = escalasBD.filter(e => e.data === dataIso);
            const isW = (diaSem === 0 || diaSem === 6);

            if (escalas.length === 0) {
                html += `<tr class="${isW ? 'weekend' : ''}"><td class="day-row">${d} | ${diasSemana[diaSem]}</td><td colspan="5">-</td><td>-</td></tr>`;
            } else {
                escalas.forEach((esc, idx) => {
                    const gIdx = escalasBD.indexOf(esc);
                    tOficiais += parseInt(esc.oficiais || 0); tPracas += parseInt(esc.pracas || 0);
                    html += `<tr class="${isW ? 'weekend' : ''}">
                        ${idx === 0 ? `<td rowspan="${escalas.length}" class="day-row">${d} | ${diasSemana[diaSem]}</td>` : ''}
                        <td>${esc.id}</td><td>${esc.inicio}-${esc.termino}</td><td>${esc.desc}</td>
                        <td>${esc.oficiais}</td><td>${esc.pracas}</td>
                        <td><button onclick="editarEscala(${gIdx})">Edit</button> <button onclick="excluirEscala(${gIdx})">X</button></td></tr>`;
                });
            }
        }
        container.innerHTML = html + '</tbody></table>';
        document.getElementById('total-oficiais').innerText = tOficiais;
        document.getElementById('total-pracas').innerText = tPracas;
    }

    // Modal e Funções de apoio
    function abrirModal(index = -1) {
        document.getElementById('modalEscala').style.display = 'flex';
        document.getElementById('edit-index').value = index;
        selectedDays = [];
        if(index !== -1) {
            const e = escalasBD[index];
            document.getElementById('multi-day-container').style.display = 'none';
            document.getElementById('single-day-container').style.display = 'block';
            document.getElementById('esc-data-single').value = e.data;
            document.getElementById('esc-id-single').value = e.id;
            document.getElementById('esc-inicio').value = e.inicio;
            document.getElementById('esc-termino').value = e.termino;
            document.getElementById('esc-desc').value = e.desc;
            document.getElementById('esc-oficiais').value = e.oficiais;
            document.getElementById('esc-pracas').value = e.pracas;
        } else {
            document.getElementById('multi-day-container').style.display = 'block';
            document.getElementById('single-day-container').style.display = 'none';
            document.getElementById('formEscala').reset();
            renderSelectedDays();
        }
    }

    function fecharModal() { document.getElementById('modalEscala').style.display = 'none'; }
    
    function addDayToList() {
        const d = document.getElementById('esc-data-picker').value;
        if(d && !selectedDays.find(x => x.data === d)) {
            selectedDays.push({ data: d, id: '' });
            renderSelectedDays();
        }
    }

    function renderSelectedDays() {
        const list = document.getElementById('selected-days-list');
        list.innerHTML = selectedDays.map((d, i) => `
            <div class="day-entry">
                <span>${d.data}</span>
                <input type="text" placeholder="ID" onchange="selectedDays[${i}].id=this.value">
            </div>
        `).join('');
    }

    function calcularTermino() {
        const i = document.getElementById('esc-inicio').value;
        if (!i) return;
        let [h, m] = i.split(':').map(Number);
        h = (h + 8) % 24;
        document.getElementById('esc-termino').value = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
    }

    document.getElementById('formEscala').onsubmit = async function(e) {
        e.preventDefault();
        const index = parseInt(document.getElementById('edit-index').value);
        const comum = {
            inicio: document.getElementById('esc-inicio').value,
            termino: document.getElementById('esc-termino').value,
            desc: document.getElementById('esc-desc').value,
            pracas: document.getElementById('esc-pracas').value,
            oficiais: document.getElementById('esc-oficiais').value
        };

        if (index === -1) {
            selectedDays.forEach(dia => {
                escalasBD.push({ ...comum, data: dia.data, id: dia.id || 'S/ID' });
            });
        } else {
            escalasBD[index] = { ...comum, data: document.getElementById('esc-data-single').value, id: document.getElementById('esc-id-single').value };
        }
        fecharModal();
        generateDelegadaList();
        await syncToSheets();
    };

    async function excluirEscala(idx) {
        if(confirm("Excluir?")) { escalasBD.splice(idx, 1); generateDelegadaList(); await syncToSheets(); }
    }

    function logout() { localStorage.clear(); location.reload(); }

    // INICIALIZAÇÃO CORRIGIDA
    window.addEventListener('load', () => {
        const m = localStorage.getItem('ultimoMes');
        const a = localStorage.getItem('ultimoAno');
        
        if (m !== null && a !== null) {
            // Se existia um período, reconstrói a tela de seleção e clica no botão de carregar
            showDelegadaSelector().then(() => {
                document.getElementById('sel-mes').value = m;
                document.getElementById('sel-ano').value = a;
                renderTableFlow();
            });
        } else {
            showDashboard();
        }
    });

    function editarEscala(idx) { abrirModal(idx); }
</script>
</body>
</html>
